# =============================================================================
# docker-compose.yml — WhatsApp Analyzer Pro
# Local development and testing with Docker Compose
# =============================================================================

version: '3.8'

services:

  # ---- Main Application ----
  whatsapp-analyzer:
    build:
      context: ..
      dockerfile: devops/Dockerfile
    container_name: whatsapp-analyzer
    image: deepu84059/whatsapp-analyzer:latest
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount source code for development hot reload
      - ..:/app
      # Exclude venv from mount
      - /app/venv
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - analyzer-network

networks:
  analyzer-network:
    driver: bridge